name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'
    
    - name: Cache Julia packages
      uses: julia-actions/cache@v2
    
    - name: Run tests
      run: julia --project=. -e 'using Pkg; Pkg.instantiate(); include("test_antikythera.jl")'
